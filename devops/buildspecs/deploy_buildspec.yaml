version: 0.2

# ── deploy_buildspec.yaml — SAM Deploy Phase ─────────────────────────────────
#
# Stage 3: Deploys the packaged SAM template natively bypassing manual scripts.
#
# CodePipeline passes the packaged.yaml file generated by the Build stage
# as the BuildOutput artifact.
# ─────────────────────────────────────────────────────────────────────────────

phases:
  build:
    commands:
      - echo "Deploying SAM Application to CloudFormation..."
      - sam deploy --template-file "$CODEBUILD_SRC_DIR_BuildOutput/packaged.yaml" --stack-name "$INFRA_STACK_NAME" --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND --no-fail-on-empty-changeset --parameter-overrides LambdaFunctionName="$LAMBDA_FUNCTION_NAME"

