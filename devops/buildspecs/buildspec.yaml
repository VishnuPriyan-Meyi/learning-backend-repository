version: 0.2

# ── buildspec.yaml — SAM Build Phase ─────────────────────────────────────────
#
# Stage 2: Runs sam build to compile the backend application, then runs
#          sam package to upload the code to S3 and generate packaged.yaml
#
# The pipeline injects the ARTIFACTS_BUCKET environment variable so
# SAM knows where to store the compiled deployment ZIPs.
# ─────────────────────────────────────────────────────────────────────────────

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      # AWS SAM CLI is pre-installed in the CodeBuild standard:7.0 image.
      - sam --version

  build:
    commands:
      - echo "Building Serverless Application..."
      # sam build natively reads CodeUri: ../../backend-deployment/ and runs npm install
      - sam build -t devops/templates/backend_template.yaml

      - echo "Packaging Application & Uploading natively via SAM Bootstrap..."
      - sam package --resolve-s3 --output-template-file packaged.yaml

artifacts:
  files:
    - packaged.yaml
  discard-paths: yes
