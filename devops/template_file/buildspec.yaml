version: 0.2

# ── buildspec.yaml — Lambda Build Phase ──────────────────────────────────────
#
# Used by the "BackendBuild" CodeBuild project (Stage 2: Build).
# Packages the Lambda function source into a ZIP file ready for deployment.
#
# What this does:
#   1. Moves into the backend-deployment/ folder
#   2. Installs production dependencies (if any)
#   3. ZIPs the entire folder into lambda-deployment.zip
#   4. Exports the ZIP as the pipeline artifact
#
# The Deploy stage (Stage 3) picks up this ZIP and runs:
#   aws lambda update-function-code --zip-file fileb://lambda-deployment.zip
# ─────────────────────────────────────────────────────────────────────────────

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing Lambda dependencies..."
      # Chain cd with && because CodeBuild resets to source root between phases.
      # --production skips devDependencies (keeps the ZIP small).
      - cd backend-deployment && npm install --production

  build:
    commands:
      - echo "Packaging Lambda function into ZIP..."
      # IMPORTANT: cd must be chained with && because each CodeBuild command
      # resets to the source root. We cd INTO backend-deployment so that
      # ../lambda-deployment.zip resolves to the source root (one level up).
      - cd backend-deployment && zip -r ../lambda-deployment.zip .
      - echo "ZIP created:"
      # ls runs from source root (default after the previous command resets)
      - ls -lh lambda-deployment.zip

# ── Artifacts ────────────────────────────────────────────────────────────────
# Export ONLY the ZIP file (not the whole repo) to the next pipeline stage.
# The Deploy stage's buildspec (deploy_buildspec.yaml) will receive this ZIP
# and push it to the Lambda function.
artifacts:
  files:
    - lambda-deployment.zip
  discard-paths: yes   # Keep the ZIP at the artifact root (no subfolder nesting)
