version: 0.2

# ── buildspec.yaml — Lambda Build Phase ──────────────────────────────────────
#
# The Lambda source files (index.js, package.json) live at the REPO ROOT.
# devops/ holds only pipeline config and is NOT included in the Lambda ZIP.
#
# Stages:
#   install → npm install (from repo root)
#   build   → zip only the Lambda files → lambda-deployment.zip
# ─────────────────────────────────────────────────────────────────────────────

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing Lambda dependencies..."
      - npm install --production

  build:
    commands:
      - echo "Packaging Lambda function into ZIP..."
      # Zip only the Lambda source files — exclude devops/ and other pipeline artifacts.
      - zip -r lambda-deployment.zip index.js package.json package-lock.json node_modules/ 2>/dev/null || zip -r lambda-deployment.zip index.js package.json
      - echo "ZIP created:"
      - ls -lh lambda-deployment.zip

# ── Artifacts ────────────────────────────────────────────────────────────────
artifacts:
  files:
    - lambda-deployment.zip
  discard-paths: yes
