AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Node.js Backend CI/CD Pipeline — Serverless Deployment.
  Provisions the CodePipeline, CodeBuild containers, S3 Artifacts, and entirely fine-grained IAM logic.

# ── Parameters ────────────────────────────────────────────────
# These are passed in by setup.sh from .env values.
Parameters:

  GitHubOrgRepo:
    Type: String
    Description: GitHub repository in ORG/REPO format (e.g. myorg/learning-backend-repository)

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to watch and trigger the pipeline on

  InfraStackName:
    Type: String
    Description: Name of the SAM infrastructure stack to be deployed.

  GitHubConnectionArn:
    Type: String
    Description: >-
      ARN of a manually created and AVAILABLE CodeStar GitHub connection.
      Create this in AWS Console: CodePipeline > Settings > Connections > Create connection > GitHub

  BootstrapStackName:
    Type: String
    Description: Name of the shared artifact bootstrap stack

# ── Resources ─────────────────────────────────────────────────
Resources:

  # ── Import Shared Artifacts Bucket ─────────────────────────────
  # Import the shared artifact bucket from bootstrap stack using CloudFormation exports

  # ── IAM Role: CodePipeline ────────────────────────────────────
  # Allows CodePipeline to read/write S3, trigger CodeBuild, and use
  # the GitHub connection.
  BackendCodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BackendCodePipelineRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendCodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 — read/write pipeline artifacts (including the Lambda ZIP)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                  - s3:GetObjectVersion
                  - s3:DeleteObject
                Resource: 
                  - Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketArn"
                  - !Sub "${Fn::ImportValue: ${BootstrapStackName}-SharedArtifactBucketArn}/*"
              # CodeBuild — start builds and check status
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:BatchGetProjects
                Resource: 
                  - !GetAtt BackendBuildProject.Arn
                  - !GetAtt BackendDeployProject.Arn
              # GitHub connection — pull source code
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt BackendCodeBuildRole.Arn

  # ── IAM Role: CodeBuild ───────────────────────────────────────
  # Allows CodeBuild to write CloudWatch logs, access S3 artifacts,
  # and update the Lambda function code (deploy step).
  BackendCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BackendCodeBuildRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendCodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs — stream build output
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # S3 — read source artifact, write Lambda ZIP artifact
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                  - s3:CreateBucket
                Resource: 
                  - Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketArn"
                  - !Sub "${Fn::ImportValue: ${BootstrapStackName}-SharedArtifactBucketArn}/*"
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*"
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*/*"
              # Lambda + CloudFormation — update SAM stack and resources
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                Resource: 
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${InfraStackName}/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${InfraStackName}"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:ListTags
                  - lambda:TagResource
                  - lambda:UntagResource
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
              - Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource: !Sub "arn:aws:apigateway:${AWS::Region}::/*"
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
              # CodeBuild Reports — optional test reporting
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/*"

  # ── GitHub Connection ─────────────────────────────────────────
  # NOTE: The connection is NOT created by CloudFormation here.
  # Connections created via CloudFormation have OAuth issues.
  # Instead, create it manually in the AWS Console:
  #   CodePipeline > Settings > Connections > Create connection > GitHub
  # Then paste the ARN into .env as GITHUB_CONNECTION_ARN.

  # ── CodeBuild: Build Configuration ────────────────────────────
  # Executes the `sam package` architecture build.
  BackendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: backend-lambda-build-project
      ServiceRole: !GetAtt BackendCodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/buildspecs/buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: ARTIFACTS_BUCKET
            Value: 
              Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketName"
            Type: PLAINTEXT
          - Name: ARTIFACT_BUCKET_PREFIX
            Value: backend/
            Type: PLAINTEXT

  # ── CodeBuild: Deploy Configuration ───────────────────────────
  # Executes `sam deploy` to migrate the native CloudFormation templates onto AWS.
  LambdaDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: backend-lambda-deploy-project
      ServiceRole: !GetAtt BackendCodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/buildspecs/deploy_buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: ARTIFACTS_BUCKET
            Value: 
              Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketName"
            Type: PLAINTEXT
          - Name: INFRA_STACK_NAME
            Value: !Ref InfraStackName
            Type: PLAINTEXT

  # ── CodePipeline ──────────────────────────────────────────────
  BackendPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt BackendCodePipelineRole.Arn

      ArtifactStore:
        Type: S3
        Location: 
          Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketName"

      Stages:

        # ── Stage 1: Source ───────────────────────────────────────
        # Pull code natively from GitHub and stores the SourceOutput artifact.
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubOrgRepo
                BranchName: !Ref GitHubBranch

        # ── Stage 2: Build ────────────────────────────────────────
        # Packages the infrastructure securely via SAM CLI.
        - Name: Build
          Actions:
            - Name: LambdaBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput   # Contains lambda-deployment.zip
              Configuration:
                ProjectName: !Ref BackendBuildProject

        # ── Stage 3: Deploy ───────────────────────────────────────
        # Boots up the Deploy container to run native CloudFormation executions.
        - Name: Deploy
          Actions:

            # Securely parses the Build stage parameters directly into the deployment runner.
            - Name: LambdaDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput   # Primary: contains deploy.sh
                - Name: BuildOutput    # Secondary: contains the ZIP
              Configuration:
                ProjectName: !Ref LambdaDeployProject
                PrimarySource: SourceOutput
              RunOrder: 1

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  PipelineName:
    Description: Name of the created CodePipeline
    Value: !Ref BackendPipeline

  ArtifactsBucketName:
    Description: S3 bucket used for pipeline artifacts (also stores Lambda ZIPs)
    Value: 
      Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketName"
