AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Node.js Backend CI/CD Pipeline — Lambda Deployment.
  Defines ALL related resources in one stack:
  IAM roles, CodeBuild projects, GitHub connection reference, and the pipeline.

# ── Parameters ────────────────────────────────────────────────
# These are passed in by setup.sh from .env values.
Parameters:

  GitHubOrgRepo:
    Type: String
    Description: GitHub repository in ORG/REPO format (e.g. myorg/learning-backend-repository)

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to watch and trigger the pipeline on

  InfraStackName:
    Type: String
    Description: Name of the SAM infrastructure stack to be deployed.

  GitHubConnectionArn:
    Type: String
    Description: >-
      ARN of a manually created and AVAILABLE CodeStar GitHub connection.
      Create this in AWS Console: CodePipeline > Settings > Connections > Create connection > GitHub

  ArtifactsBucketName:
    Type: String
    Description: Name of the existing shared artifact bucket

# ── Resources ─────────────────────────────────────────────────
Resources:

  # ── Use Existing Shared Artifacts Bucket ─────────────────────
  # Reference to existing shared bucket - don't create new one
  # CloudFormation will validate access but won't try to create
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref ArtifactsBucketName
    Metadata:
      Comment: "Existing shared bucket - pipeline validates access only"

  # ── IAM Role: CodePipeline ────────────────────────────────────
  # Allows CodePipeline to read/write S3, trigger CodeBuild, and use
  # the GitHub connection.
  BackendCodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BackendCodePipelineRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendCodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 — read/write pipeline artifacts (including the Lambda ZIP)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                  - s3:GetObjectVersion
                  - s3:DeleteObject
                Resource: 
                  - !GetAtt ArtifactsBucket.Arn
                  - !Sub "${ArtifactsBucket.Arn}/*"
              # CodeBuild — start builds and check status
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:BatchGetProjects
                Resource: 
                  - !GetAtt BackendBuildProject.Arn
                  - !GetAtt LambdaDeployProject.Arn
              # GitHub connection — pull source code
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt BackendCodeBuildRole.Arn

  # ── IAM Role: CodeBuild ───────────────────────────────────────
  # Allows CodeBuild to write CloudWatch logs, access S3 artifacts,
  # and update the Lambda function code (deploy step).
  BackendCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BackendCodeBuildRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendCodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs — stream build output
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # S3 — read source artifact, write Lambda ZIP artifact
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                  - s3:CreateBucket
                Resource: 
                  - !GetAtt ArtifactsBucket.Arn
                  - !Sub "${ArtifactsBucket.Arn}/*"
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*"
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*/*"
              # Lambda + CloudFormation — update SAM stack and resources
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: 
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${InfraStackName}/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${InfraStackName}"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource: !Sub "arn:aws:apigateway:${AWS::Region}::/*"
              - Effect: Allow
                Action:
                  - iam:*
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
              # CodeBuild Reports — optional test reporting
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/*"

  # ── GitHub Connection ─────────────────────────────────────────
  # NOTE: The connection is NOT created by CloudFormation here.
  # Connections created via CloudFormation have OAuth issues.
  # Instead, create it manually in the AWS Console:
  #   CodePipeline > Settings > Connections > Create connection > GitHub
  # Then paste the ARN into .env as GITHUB_CONNECTION_ARN.

  # ── CodeBuild: Lambda Build Project ───────────────────────────
  # Stage 2: Runs npm install + zips the backend-deployment/ folder.
  # Equivalent to ReactBuildProject in the frontend pipeline.
  # Uses devops/template_file/buildspec.yaml.
  BackendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: backend-lambda-build-project
      ServiceRole: !GetAtt BackendCodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/buildspecs/buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: ARTIFACTS_BUCKET
            Value: !Ref ArtifactsBucket
            Type: PLAINTEXT
          - Name: ARTIFACT_BUCKET_PREFIX
            Value: backend/
            Type: PLAINTEXT

  # ── CodeBuild: Lambda Deploy Project ──────────────────────────
  # Stage 3: Calls aws lambda update-function-code to push the new ZIP.
  # Equivalent to CloudFrontInvalidationProject in the frontend pipeline.
  #
  # Buildspec is INLINE (no external file dependency).
  # Input artifact BuildOutput contains lambda-deployment.zip at $CODEBUILD_SRC_DIR.
  LambdaDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: backend-lambda-deploy-project
      ServiceRole: !GetAtt BackendCodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/buildspecs/deploy_buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: INFRA_STACK_NAME
            Value: !Ref InfraStackName
            Type: PLAINTEXT
          - Name: ARTIFACT_BUCKET_PREFIX
            Value: backend/
            Type: PLAINTEXT

  # ── CodePipeline ──────────────────────────────────────────────
  BackendPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt BackendCodePipelineRole.Arn

      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactsBucket
        EncryptionKey:
          Id: aws/s3
          Type: KMS

      Stages:

        # ── Stage 1: Source ───────────────────────────────────────
        # Pull code from GitHub whenever a push is made to the branch.
        # Equivalent to the frontend's Source stage.
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubOrgRepo
                BranchName: !Ref GitHubBranch

        # ── Stage 2: Build ────────────────────────────────────────
        # npm install + zip backend-deployment/ → lambda-deployment.zip
        # Equivalent to the frontend's Build stage (React build).
        - Name: Build
          Actions:
            - Name: LambdaBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput   # Contains lambda-deployment.zip
              Configuration:
                ProjectName: !Ref BackendBuildProject

        # ── Stage 3: Deploy ───────────────────────────────────────
        # Push the ZIP to Lambda via aws lambda update-function-code.
        # Equivalent to the frontend's Deploy stage (S3 upload + CF invalidation).
        - Name: Deploy
          Actions:

            # Action: Push ZIP → Lambda
            # BuildOutput contains lambda-deployment.zip from the Build stage.
            # The buildspec is inlined in the CodeBuild project above,
            # so no source file lookup is needed.
            - Name: LambdaDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput   # Primary: contains deploy.sh
                - Name: BuildOutput    # Secondary: contains the ZIP
              Configuration:
                ProjectName: !Ref LambdaDeployProject
                PrimarySource: SourceOutput
              RunOrder: 1

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  PipelineName:
    Description: Name of the created CodePipeline
    Value: !Ref BackendPipeline

  ArtifactsBucketName:
    Description: S3 bucket used for pipeline artifacts (also stores Lambda ZIPs)
    Value: !Ref ArtifactsBucket
