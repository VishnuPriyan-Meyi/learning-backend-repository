AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Node.js Backend Infrastructure — SAM Template (Lambda Function + HTTP API).
  Creates the IAM execution role, Lambda function, and a public HTTP API endpoint.

Parameters:

  LambdaFunctionName:
    Type: String
    Description: Name for the Lambda function (e.g. learning-backend-function)

  ApiStageName:
    Type: String
    Default: Prod
    Description: Name of the API Gateway stage (e.g. dev, prod)

  CorsAllowOrigin:
    Type: String
    Default: "'*'"
    Description: "CORS AllowOrigin header enclosed in single quotes (e.g. \"'*'\" or \"'https://example.com'\")"

Resources:

  # ── API Gateway REST API (SAM) ─────────────────────────────────
  BackendRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref ApiStageName
      Cors: 
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'*'"
        AllowOrigin: !Ref CorsAllowOrigin

  # ── IAM Role: Lambda Execution ────────────────────────────────
  # Lambda needs this role to write CloudWatch logs. Add more policies
  # here if your function needs to access DynamoDB, S3, SQS, etc.
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Grants permission to create log groups/streams in CloudWatch Logs
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ── Lambda Function (SAM) ──────────────────────────────────────
  BackendLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Description: Learning Backend — Node.js Lambda API
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      CodeUri: ../../backend-deployment/
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        ApiProxyEvent:
          Type: Api
          Properties:
            RestApiId: !Ref BackendRestApi
            Path: /{proxy+}
            Method: ANY
        ApiRootEvent:
          Type: Api
          Properties:
            RestApiId: !Ref BackendRestApi
            Path: /
            Method: ANY

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  LambdaFunctionName:
    Description: Lambda function name (used by the deploy step to update code)
    Value: !Ref BackendLambdaFunction

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BackendLambdaFunction.Arn

  ApiEndpoint:
    Description: Public base URL of the REST API
    Value: !Sub 'https://${BackendRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/'

